<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Estética Mirella</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h2>🔐 Acceso al Sistema</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <p class="error-msg" id="errorMsg"></p>
    </div>
</div>

<script>
    // Usuarios precargados
    const usuarios = [
        { email: "admin@esteticamirella.com", password: "admin123", rol: "admin", nombre: "Administrador" },
        { email: "manicura@esteticamirella.com", password: "manicura123", rol: "especialista1", nombre: "Especialista Manicura" },
        { email: "cabello@esteticamirella.com", password: "cabello123", rol: "especialista2", nombre: "Especialista Cabello" },
        { email: "cejas@esteticamirella.com", password: "cejas123", rol: "especialista3", nombre: "Especialista Cejas" }
    ];

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const user = usuarios.find(u => u.email === email && u.password === pass);
        if (user) {
            localStorage.setItem('user', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('errorMsg').innerText = 'Credenciales incorrectas';
        }
    }
</script>
</body>
</html>
